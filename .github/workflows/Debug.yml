name: Android Manual Debug Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build Debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug
          echo "apk=$(ls app/build/outputs/apk/debug/*.apk | head -n 1)" >> $GITHUB_ENV

      - name: Upload APK
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Hail-debug-apk
          path: ${{ env.apk }}
          archive: false
